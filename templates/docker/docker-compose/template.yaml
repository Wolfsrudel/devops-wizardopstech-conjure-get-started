name: docker-compose
description: Docker Compose configuration for local development
version: 1.0.0

variables:
  - name: app_name
    description: Application name
    required: true

  - name: app_port
    description: Application port
    default: 8080

  - name: include_database
    description: Include PostgreSQL database
    default: true

  - name: include_redis
    description: Include Redis cache
    default: false

  - name: include_nginx
    description: Include Nginx reverse proxy
    default: false

  - name: postgres_version
    description: PostgreSQL version
    default: "15-alpine"

  - name: redis_version
    description: Redis version
    default: "7-alpine"

  - name: nginx_version
    description: Nginx version
    default: "alpine"
