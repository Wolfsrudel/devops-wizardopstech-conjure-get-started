name: dockerfile
description: Multi-stage Dockerfile for Node.js, Python, Go, or Java applications
version: 1.0.0

variables:
  - name: language
    description: Programming language (nodejs, python, go, java)
    required: true

  - name: app_name
    description: Application name
    required: true

  - name: port
    description: Application port
    default: 8080

  - name: node_version
    description: Node.js version (only for nodejs)
    default: "20-alpine"

  - name: python_version
    description: Python version (only for python)
    default: "3.12-slim"

  - name: go_version
    description: Go version (only for go)
    default: "1.21-alpine"

  - name: java_version
    description: Java version (only for java)
    default: "17-alpine"

  - name: working_dir
    description: Working directory in container
    default: /app
