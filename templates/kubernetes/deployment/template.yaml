name: kubernetes-deployment
description: Kubernetes Deployment manifest with configurable replicas, resources, and health checks
version: 1.0.0

variables:
  - name: app_name
    description: Name of the application
    required: true

  - name: namespace
    description: Kubernetes namespace
    default: default

  - name: image
    description: Container image (e.g., nginx:latest)
    required: true

  - name: replicas
    description: Number of pod replicas
    default: 3

  - name: port
    description: Container port
    default: 8080

  - name: cpu_request
    description: CPU request (e.g., 100m)
    default: 100m

  - name: cpu_limit
    description: CPU limit (e.g., 500m)
    default: 500m

  - name: memory_request
    description: Memory request (e.g., 128Mi)
    default: 128Mi

  - name: memory_limit
    description: Memory limit (e.g., 512Mi)
    default: 512Mi

  - name: enable_health_checks
    description: Enable liveness and readiness probes
    default: true

  - name: health_check_path
    description: HTTP path for health checks
    default: /health

  - name: image_pull_policy
    description: Image pull policy (Always, IfNotPresent, Never)
    default: IfNotPresent
