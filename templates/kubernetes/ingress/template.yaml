name: kubernetes-ingress
description: Kubernetes Ingress with TLS support
version: 1.0.0

variables:
  - name: app_name
    description: Name of the application
    required: true

  - name: namespace
    description: Kubernetes namespace
    default: default

  - name: host
    description: Hostname for the ingress (e.g., api.example.com)
    required: true

  - name: service_name
    description: Backend service name
    required: true

  - name: service_port
    description: Backend service port
    default: 80

  - name: enable_tls
    description: Enable TLS/SSL
    default: true

  - name: tls_secret_name
    description: Name of TLS secret (required if enable_tls is true)
    default: tls-secret

  - name: ingress_class
    description: Ingress class (nginx, traefik, etc.)
    default: nginx

  - name: path
    description: Path for routing
    default: /

  - name: path_type
    description: Path type (Prefix, Exact, ImplementationSpecific)
    default: Prefix
