name: github-actions-node-ci
description: GitHub Actions workflow for Node.js CI/CD with testing, building, and deployment
version: 1.0.0

variables:
  - name: app_name
    description: Application name
    required: true

  - name: node_version
    description: Node.js version
    default: "20"

  - name: enable_docker
    description: Build and push Docker image
    default: true

  - name: docker_registry
    description: Docker registry (ghcr.io, docker.io)
    default: ghcr.io

  - name: enable_kubernetes_deploy
    description: Deploy to Kubernetes
    default: false

  - name: run_tests
    description: Run tests before deployment
    default: true

  - name: run_lint
    description: Run linter before deployment
    default: true
