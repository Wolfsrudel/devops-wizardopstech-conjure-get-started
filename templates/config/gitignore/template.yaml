name: gitignore
description: Comprehensive .gitignore for various project types
version: 1.0.0

variables:
  - name: language
    description: Primary language (nodejs, python, go, java)
    required: true

  - name: include_ide
    description: Include IDE-specific ignores
    default: true

  - name: include_os
    description: Include OS-specific ignores
    default: true

  - name: include_docker
    description: Include Docker-specific ignores
    default: false
