# Web App Bundle - Production Configuration Example

# Shared Variables (apply to all templates)
app_name: my-api
namespace: production
port: 8080

# Deployment Variables
replicas: 5
image: ghcr.io/myorg/my-api:1.0.0
cpu_request: 250m
cpu_limit: 1000m
memory_request: 256Mi
memory_limit: 1Gi

# Service Variables
service_type: LoadBalancer
service_port: 80

# Docker Compose Variables (for local development)
include_database: true
include_redis: true
