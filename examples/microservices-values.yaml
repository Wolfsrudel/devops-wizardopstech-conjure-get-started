# Microservices Platform Configuration Example

# Project Configuration
project_name: ecommerce
namespace: production

# API Gateway
gateway_image: ghcr.io/myorg/api-gateway:latest
gateway_host: api.ecommerce.com

# Auth Service
auth_image: ghcr.io/myorg/auth-service:latest

# User Service
user_image: ghcr.io/myorg/user-service:latest

# Order Service (optional)
include_order_service: true
order_image: ghcr.io/myorg/order-service:latest

# Common Configuration
replicas: 3
enable_tls: true

# Resource Limits (applied to all services)
cpu_request: 200m
cpu_limit: 500m
memory_request: 256Mi
memory_limit: 512Mi
